<svg width="680" height="630" viewBox="0 0 680 630" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff">
<title>UML class diagram for the notes management system</title>
<desc>Shows User, Admin, Note, NoteBook and Storage classes with their attributes, methods, and the inheritance, composition, aggregation and association relationships between them.</desc>

<style>
text { font-family: Arial, Helvetica, sans-serif; }
.th { font-size: 14px; font-weight: 600; fill: #0C447C; }
.th-teal { font-size: 14px; font-weight: 600; fill: #085041; }
.th-gray { font-size: 14px; font-weight: 600; fill: #444441; }
.ts { font-size: 12px; fill: #0C447C; }
.ts-teal { font-size: 12px; fill: #085041; }
.ts-gray { font-size: 12px; fill: #444441; }
.box-blue { fill: #E6F1FB; stroke: #185FA5; stroke-width: 1; }
.box-teal { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 1; }
.box-gray { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 1; }
.divider { stroke: #999; stroke-width: 0.5; opacity: 0.6; }
.rel { stroke: #333; stroke-width: 1; fill: none; }
</style>

<rect class="box-blue" x="40" y="40" width="260" height="198" rx="6"/>
<text class="th" x="170" y="58" text-anchor="middle">User</text>
<line class="divider" x1="40" y1="68" x2="300" y2="68"/>
<text class="ts" x="52" y="88">- id: number</text>
<text class="ts" x="52" y="104">+ name: string</text>
<text class="ts" x="52" y="120">+ email: string</text>
<text class="ts" x="52" y="136">- password: string</text>
<text class="ts" x="52" y="152"># phone: string</text>
<text class="ts" x="52" y="168">- age: number</text>
<line class="divider" x1="40" y1="172" x2="300" y2="172"/>
<text class="ts" x="52" y="192">+ displayInfo()</text>
<text class="ts" x="52" y="208">+ addNotebook(nb)</text>
<text class="ts" x="52" y="224">+ getNotebooks(): NoteBook[]</text>

<rect class="box-teal" x="380" y="40" width="260" height="150" rx="6"/>
<text class="th-teal" x="510" y="58" text-anchor="middle">NoteBook</text>
<line class="divider" x1="380" y1="68" x2="640" y2="68"/>
<text class="ts-teal" x="392" y="88">- id: number</text>
<text class="ts-teal" x="392" y="104">+ name: string</text>
<text class="ts-teal" x="392" y="120">- notes: Note[]</text>
<line class="divider" x1="380" y1="124" x2="640" y2="124"/>
<text class="ts-teal" x="392" y="144">+ addNote(note)</text>
<text class="ts-teal" x="392" y="160">+ removeNote(id)</text>
<text class="ts-teal" x="392" y="176">+ getNotes(): Note[]</text>

<rect class="box-blue" x="40" y="310" width="260" height="64" rx="6"/>
<text class="th" x="170" y="328" text-anchor="middle">Admin</text>
<line class="divider" x1="40" y1="338" x2="300" y2="338"/>
<text class="ts" x="52" y="358">+ manageNotes(nb, action, note)</text>

<rect class="box-teal" x="380" y="260" width="260" height="134" rx="6"/>
<text class="th-teal" x="510" y="278" text-anchor="middle">Note</text>
<line class="divider" x1="380" y1="288" x2="640" y2="288"/>
<text class="ts-teal" x="392" y="308">- id: number</text>
<text class="ts-teal" x="392" y="324">+ title: string</text>
<text class="ts-teal" x="392" y="340">+ content: string</text>
<text class="ts-teal" x="392" y="356">- userId: number</text>
<line class="divider" x1="380" y1="360" x2="640" y2="360"/>
<text class="ts-teal" x="392" y="380">+ preview(): string</text>

<rect class="box-gray" x="210" y="470" width="260" height="118" rx="6"/>
<text class="th-gray" x="340" y="488" text-anchor="middle">Storage&lt;T&gt;</text>
<line class="divider" x1="210" y1="498" x2="470" y2="498"/>
<text class="ts-gray" x="222" y="518">- items: T[]</text>
<line class="divider" x1="210" y1="522" x2="470" y2="522"/>
<text class="ts-gray" x="222" y="542">+ addItem(item)</text>
<text class="ts-gray" x="222" y="558">+ removeItem(item)</text>
<text class="ts-gray" x="222" y="574">+ getAllItems(): T[]</text>

<line class="rel" x1="170" y1="310" x2="170" y2="250"/>
<polygon points="170,238 163,250 177,250" fill="#ffffff" stroke="#333" stroke-width="1"/>

<path class="rel" d="M510 190 V202"/>
<path class="rel" d="M510 202 V260"/>
<polygon points="510,190 516,196 510,202 504,196" fill="#333" stroke="#333" stroke-width="1"/>

<path class="rel" d="M312 140 H350 V115 H380"/>
<polygon points="300,140 306,136 312,140 306,144" fill="#ffffff" stroke="#333" stroke-width="1"/>

<path class="rel" d="M300 200 H350 V328 H380"/>
<text class="ts-gray" x="306" y="196">1</text>
<text class="ts-gray" x="356" y="324">*</text>
<text class="ts-gray" x="352" y="270" text-anchor="middle">author</text>

<g transform="translate(40,610)">
<line x1="0" y1="0" x2="24" y2="0" stroke="#333" stroke-width="1"/>
<polygon points="24,0 12,-6 12,6" fill="#ffffff" stroke="#333" stroke-width="1"/>
<text x="30" y="4" font-size="11" fill="#444">inheritance</text>

<line x1="130" y1="0" x2="154" y2="0" stroke="#333" stroke-width="1"/>
<polygon points="130,0 138,-5 146,0 138,5" fill="#333" stroke="#333" stroke-width="1"/>
<text x="160" y="4" font-size="11" fill="#444">composition</text>

<line x1="280" y1="0" x2="304" y2="0" stroke="#333" stroke-width="1"/>
<polygon points="280,0 288,-5 296,0 288,5" fill="#ffffff" stroke="#333" stroke-width="1"/>
<text x="310" y="4" font-size="11" fill="#444">aggregation</text>

<line x1="430" y1="0" x2="470" y2="0" stroke="#333" stroke-width="1"/>
<text x="476" y="4" font-size="11" fill="#444">association</text>
</g>

</svg>
